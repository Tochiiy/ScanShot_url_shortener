services:
  - type: web
    name: scanshort-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
